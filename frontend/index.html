<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TOK Farm</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading" class="loading">
  <div class="load-icon">🌱</div>
  <div class="load-text">Cargando tu granja...</div>
</div>

<div id="app" style="display:none">
  <!-- Pages -->
  <div id="pages">
    <section id="page-home" class="page active"></section>
    <section id="page-farm" class="page"></section>
    <section id="page-friends" class="page"></section>
    <section id="page-wallet" class="page"></section>
  </div>

  <!-- Bottom Nav -->
  <nav id="navbar">
    <button class="nav-item active" data-page="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Inicio</span>
    </button>
    <button class="nav-item" data-page="farm">
      <span class="nav-icon">🌾</span>
      <span class="nav-label">Farm</span>
    </button>
    <button class="nav-item" data-page="friends">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Amigos</span>
    </button>
    <button class="nav-item" data-page="wallet">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Cartera</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<script src="main.js"></script>
</body>
</html>
